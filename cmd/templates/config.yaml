# Orbit project configuration
# Edit this file to define your deployment workflows.
#
# Run `orbit list` to see all projects.
# Run `orbit run <project-name>` to execute a project.

projects:
  # ──────────────────────────────────────────────
  # Example 1: Node.js deploy with upload (active)
  # ──────────────────────────────────────────────
  my-webapp:
    ssh:
      host: 192.168.1.100
      user: deployer
      auth:
        type: key
        key_path: ~/.ssh/id_rsa
        passphrase: my-secret-passphrase
    local:
      working_dir: ./webapp
      before:
        - echo "Building frontend..."
        - npm ci
        - npm run build
      after:
        - echo "Local build complete."
    upload:
      - source: ./webapp/dist
        destination: /srv/www/webapp
    remote:
      commands:
        - cd /srv/www/webapp
        - echo "Installing dependencies..."
        - npm ci --omit=dev
        - echo "Restarting service..."
        - sudo systemctl restart webapp.service

  # ──────────────────────────────────────────────
